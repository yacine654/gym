<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#000000" />
<title>إدارة النادي الرياضي</title>
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icon-192.png" />
<style>
  * { box-sizing: border-box; }
  html, body { margin:0; overscroll-behavior-y:contain; touch-action:pan-x pan-y; }
  * { -webkit-user-select:none; -moz-user-select:none; -ms-user-select:none; user-select:none; -webkit-touch-callout:none; }
  input, textarea { -webkit-user-select:text; -moz-user-select:text; -ms-user-select:text; user-select:text; }
  body {
    --bg:#000000; --surface:#141414; --surface-alt:#1F1F1F; --border:#3A3A3A;
    --text:#FFFFFF; --text-soft:#A0A0A0; --accent:#FFFFFF; --accent-soft:rgba(255,255,255,0.15);
    --active:#3DDC97; --warn:#FFC857; --danger:#FF5C5C;
    font-family:-apple-system,'Segoe UI',Tahoma,Arial,sans-serif;
    background:var(--bg); color:var(--text); min-height:100vh; padding:20px 16px 60px;
  }
  * { font-family: inherit; }
  .wrap { max-width: 920px; margin: 0 auto; }
  .header { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:22px; }
  .brand { display:flex; align-items:center; gap:10px; }
  .brand-icon { width:42px; height:42px; border-radius:12px; background:linear-gradient(135deg,#FFFFFF,#CFCFCF); display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:20px; }
  .brand h1 { font-family:inherit; font-weight:800; font-size:19px; margin:0; }
  .brand span { display:block; font-size:12px; color:var(--text-soft); font-weight:500; margin-top:2px; }
  .bell-btn { position:relative; width:42px; height:42px; border-radius:12px; background:var(--surface); border:1px solid var(--border); color:var(--text); display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; font-size:18px; }
  .badge { position:absolute; top:-5px; left:-5px; background:var(--danger); color:#fff; font-size:11px; font-weight:700; min-width:18px; height:18px; border-radius:9px; display:flex; align-items:center; justify-content:center; padding:0 4px; border:2px solid var(--bg); }
  .toast { background:rgba(255,200,87,0.12); border:1px solid rgba(255,200,87,0.35); color:var(--warn); padding:11px 14px; border-radius:12px; font-size:13.5px; font-weight:500; margin-bottom:18px; }
  .stats-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:20px; }
  .stat-card { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:14px; cursor:pointer; }
  .stat-card.is-active { border-color:var(--accent); background:var(--surface-alt); }
  .stat-card .num { font-family:inherit; font-weight:800; font-size:24px; }
  .stat-card .lbl { font-size:12px; color:var(--text-soft); margin-top:6px; font-weight:500; }
  .toolbar { display:flex; gap:10px; margin-bottom:16px; flex-wrap:wrap; }
  .search-box { flex:1; min-width:180px; display:flex; align-items:center; background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:0 12px; }
  .search-box input { flex:1; background:transparent; border:none; color:var(--text); padding:11px 8px; font-size:14px; outline:none; }
  .btn-primary { display:flex; align-items:center; gap:6px; background:var(--accent); color:#000000; font-weight:700; font-size:14px; border:none; border-radius:12px; padding:0 18px; cursor:pointer; white-space:nowrap; }
  .filter-pills { display:flex; gap:8px; margin-bottom:18px; overflow-x:auto; }
  .pill { font-size:13px; font-weight:600; padding:7px 14px; border-radius:999px; border:1px solid var(--border); background:var(--surface); color:var(--text-soft); cursor:pointer; white-space:nowrap; }
  .pill.active-pill { background:var(--accent-soft); color:var(--accent); border-color:var(--accent); }
  .member-list { display:flex; flex-direction:column; gap:10px; }
  .member-card { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:14px; display:flex; align-items:center; gap:14px; }
  .member-info { flex:1; min-width:0; }
  .member-info h3 { font-size:15.5px; font-weight:700; margin:0 0 6px; }
  .meta-row { display:flex; align-items:center; gap:8px; flex-wrap:wrap; font-size:12px; color:var(--text-soft); }
  .plan-tag { background:var(--surface-alt); padding:3px 9px; border-radius:999px; font-weight:600; color:var(--text); }
  .status-tag { padding:3px 9px; border-radius:999px; font-weight:700; font-size:11.5px; }
  .actions-col { display:flex; flex-direction:column; gap:6px; flex-shrink:0; }
  .icon-btn { width:34px; height:34px; border-radius:9px; border:1px solid var(--border); background:var(--surface-alt); color:var(--text-soft); display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:14px; }
  .ring-wrap { position:relative; width:56px; height:56px; flex-shrink:0; }
  .ring-text { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .ring-text span { font-family:inherit; font-weight:800; font-size:15px; }
  .ring-text small { font-size:8.5px; color:var(--text-soft); }
  .empty-state { text-align:center; padding:60px 20px; color:var(--text-soft); }
  .empty-state h3 { color:var(--text); font-family:inherit; margin:6px 0; }
  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.6); display:flex; align-items:flex-end; justify-content:center; z-index:50; }
  .modal { background:var(--surface); border:1px solid var(--border); border-radius:20px 20px 0 0; width:100%; max-width:480px; padding:20px; max-height:88vh; overflow-y:auto; }
  @media (min-width:560px) { .modal-overlay{align-items:center;} .modal{border-radius:20px;} }
  .modal-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
  .modal-head h2 { font-family:inherit; font-size:17px; margin:0; }
  .close-x { background:none; border:none; color:var(--text-soft); cursor:pointer; font-size:20px; }
  .form-group { margin-bottom:14px; }
  .form-group label { display:block; font-size:13px; font-weight:600; margin-bottom:7px; color:var(--text-soft); }
  .form-group input { width:100%; background:var(--surface-alt); border:1px solid var(--border); border-radius:10px; padding:11px 12px; color:var(--text); font-size:14.5px; outline:none; }
  .date-field { display:flex; gap:8px; }
  .date-field select { flex:1; min-width:0; background:var(--surface-alt); border:1px solid var(--border); border-radius:10px; padding:11px 8px; color:var(--text); font-size:14px; outline:none; text-align:center; }
  .plan-options { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
  .plan-option { border:1.5px solid var(--border); background:var(--surface-alt); border-radius:12px; padding:12px 6px; text-align:center; cursor:pointer; }
  .plan-option.selected { border-color:var(--accent); background:var(--accent-soft); }
  .plan-option .sessions { font-family:inherit; font-weight:800; font-size:15px; }
  .plan-option .price { font-size:12px; color:var(--text-soft); margin-top:4px; }
  .plan-option.selected .price { color:var(--accent); font-weight:700; }
  .submit-btn { width:100%; background:var(--accent); color:#000000; border:none; border-radius:12px; padding:13px; font-weight:700; font-size:15px; cursor:pointer; margin-top:6px; }
  .notif-panel { position:fixed; top:74px; left:16px; right:16px; max-width:420px; margin:0 auto; background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:14px; z-index:40; }
  .notif-panel h3 { font-family:inherit; font-size:15px; margin:0 0 10px; }
  .notif-item { display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid var(--border); font-size:13.5px; }
  .notif-item:last-child { border-bottom:none; }
  .notif-msg { font-size:12.5px; color:var(--text-soft); margin-top:8px; line-height:1.5; }
  .enable-btn { width:100%; margin-top:10px; background:var(--surface-alt); border:1px solid var(--border); color:var(--text); padding:9px; border-radius:10px; font-size:13px; font-weight:600; cursor:pointer; }
  @media (max-width:560px) { .stats-grid { grid-template-columns:repeat(2,1fr); } }
</style>
</head>
<body>
<div id="root"></div>

<script>
// ---------- الإعدادات والثوابت ----------
const PLANS = { "3": {sessions:3, price:1500}, "4": {sessions:4, price:2000}, "5": {sessions:5, price:2500} };
const DAILY_RATE = 200; // دج لكل يوم (تلقائي)
const ARABIC_MONTHS = ["جانفي","فيفري","مارس","افريل","ماي","جوان","جويليا","اوت","سبتمبر","اكتوبر","نوفمبر","ديسمبر"];
const STATUS_META = {
  active:   {label:"نشطة",       color:"#3DDC97", bg:"rgba(61,220,151,0.14)"},
  expiring: {label:"تنتهي قريبًا", color:"#FFC857", bg:"rgba(255,200,87,0.16)"},
  expired:  {label:"منتهية",      color:"#FF5C5C", bg:"rgba(255,92,92,0.16)"},
};

// ---------- دوال التواريخ ----------
function todayStr(){ const d=new Date(); const off=d.getTimezoneOffset(); return new Date(d.getTime()-off*60000).toISOString().slice(0,10); }
function getDaysInMonth(y,m){ return new Date(y,m,0).getDate(); }
function parseDateParts(value){
  if(value){ const [y,m,d]=value.split("-").map(Number); if(y&&m&&d) return {y,m,d}; }
  const n=new Date(); return {y:n.getFullYear(), m:n.getMonth()+1, d:n.getDate()};
}
function buildDateStr(y,m,d){ return `${y}-${String(m).padStart(2,"0")}-${String(d).padStart(2,"0")}`; }
function addOneMonth(dateStr){
  if(!dateStr) return null;
  const d=new Date(dateStr+"T00:00:00");
  if(isNaN(d.getTime())) return null;
  const day=d.getDate();
  const target=new Date(d.getFullYear(), d.getMonth()+1, 1);
  const lastDay=new Date(target.getFullYear(), target.getMonth()+1, 0).getDate();
  target.setDate(Math.min(day,lastDay));
  return target;
}
function safeAddOneMonthStr(dateStr){ const r=addOneMonth(dateStr); return r ? r.toISOString().slice(0,10) : null; }
function addDays(dateStr, days){
  if(!dateStr) return null;
  const d=new Date(dateStr+"T00:00:00");
  if(isNaN(d.getTime())) return null;
  d.setDate(d.getDate()+Number(days));
  return d;
}
function safeAddDaysStr(dateStr, days){ const r=addDays(dateStr,days); return r ? r.toISOString().slice(0,10) : null; }
function dumbbellIcon(size, color){
  return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect x="1" y="10" width="2" height="4" rx="0.8" fill="${color}"/>
    <rect x="3" y="8.5" width="3.2" height="7" rx="1.2" fill="${color}"/>
    <rect x="6.5" y="11" width="11" height="2" fill="${color}"/>
    <rect x="17.8" y="8.5" width="3.2" height="7" rx="1.2" fill="${color}"/>
    <rect x="21" y="10" width="2" height="4" rx="0.8" fill="${color}"/>
  </svg>`;
}
function getDaysLeft(expirationStr){
  const today=new Date(); today.setHours(0,0,0,0);
  const exp=new Date(expirationStr+"T00:00:00");
  return Math.round((exp-today)/86400000);
}
function getStatus(days){ if(days<0) return "expired"; if(days<=5) return "expiring"; return "active"; }
function formatDateAr(dateStr){ if(!dateStr) return "—"; const [y,m,d]=dateStr.split("-"); return `${d}/${m}/${y}`; }
function esc(s){ return String(s).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

// ---------- الحالة ----------
let state = {
  members: [],
  query: "",
  filter: "all",
  showForm: false,
  showNotif: false,
  notifMsg: "",
  form: { name:"", planType:"monthly", plan:"3", customDays:"", joinDate: todayStr() },
};

function loadMembers(){
  try { state.members = JSON.parse(localStorage.getItem("gym_members") || "[]"); }
  catch(e){ state.members = []; }
}
function saveMembers(){
  try { localStorage.setItem("gym_members", JSON.stringify(state.members)); }
  catch(e){ console.error("فشل الحفظ", e); }
}

// ---------- منطق الأعمال ----------
function addMember(){
  if(!state.form.name.trim()) return;
  const f = state.form;
  let memberData;
  if(f.planType === "monthly"){
    const expiration = safeAddOneMonthStr(f.joinDate);
    if(!expiration) return;
    memberData = {
      planType: "monthly",
      sessions: PLANS[f.plan].sessions,
      price: PLANS[f.plan].price,
      durationDays: null,
      expiration,
    };
  } else {
    const days = Number(f.customDays);
    if(!days || days <= 0) return;
    const expiration = safeAddDaysStr(f.joinDate, days);
    if(!expiration) return;
    memberData = {
      planType: "daily",
      sessions: null,
      price: days * DAILY_RATE,
      durationDays: days,
      expiration,
    };
  }
  state.members.unshift({
    id: Date.now().toString(36)+Math.random().toString(36).slice(2,7),
    name: f.name.trim(),
    joinDate: f.joinDate,
    ...memberData,
  });
  saveMembers();
  state.form = { name:"", planType:"monthly", plan:"3", customDays:"", joinDate: todayStr() };
  state.showForm = false;
  render();
}
function renewMember(id){
  const m = state.members.find(x=>x.id===id);
  if(!m) return;
  const today = todayStr();
  const next = m.planType === "daily"
    ? safeAddDaysStr(today, m.durationDays || 30)
    : safeAddOneMonthStr(today);
  if(next){ m.expiration = next; saveMembers(); render(); }
}
function deleteMember(id){
  if(!confirm("هل تريد حذف هذا العضو نهائيًا؟")) return;
  state.members = state.members.filter(m=>m.id!==id);
  saveMembers();
  render();
}
async function enableNotifications(){
  if(!("Notification" in window)){ state.notifMsg = "الإشعارات غير مدعومة في هذا المتصفح"; render(); return; }
  const perm = await Notification.requestPermission();
  if(perm==="granted"){
    const urgent = state.members.filter(m=>getDaysLeft(m.expiration)<=3);
    urgent.forEach(m=>{ try{ new Notification("تنبيه انتهاء عضوية", {body:`عضوية ${m.name} تنتهي قريبًا أو منتهية`}); }catch(e){} });
    state.notifMsg = urgent.length ? `تم تفعيل الإشعارات وإرسال ${urgent.length} تنبيه` : "تم تفعيل الإشعارات، لا توجد عضويات قريبة الانتهاء حاليًا";
  } else {
    state.notifMsg = "تم رفض إذن الإشعارات من المتصفح";
  }
  render();
}
// فحص دوري أثناء فتح التطبيق لإرسال إشعار عند اقتراب الانتهاء
function periodicCheck(){
  if(Notification && Notification.permission==="granted"){
    const urgent = state.members.filter(m=>getDaysLeft(m.expiration)===3 || getDaysLeft(m.expiration)===0);
    urgent.forEach(m=>{ try{ new Notification("تنبيه انتهاء عضوية", {body:`عضوية ${m.name} تنتهي قريبًا أو منتهية`}); }catch(e){} });
  }
}
setInterval(periodicCheck, 6*60*60*1000); // كل 6 ساعات إن بقي التطبيق مفتوحًا

// ---------- العرض ----------
function ringSvg(days, status, total){
  const meta = STATUS_META[status];
  const radius=21, circ=2*Math.PI*radius;
  const safeTotal = total && total > 0 ? total : 30;
  const pct = Math.max(0, Math.min(1, days/safeTotal));
  const offset = status==="expired" ? 0 : circ*(1-pct);
  const display = days<0 ? "0" : `${days}`;
  return `
    <div class="ring-wrap">
      <svg width="56" height="56" viewBox="0 0 56 56">
        <circle cx="28" cy="28" r="${radius}" fill="none" stroke="#3A3A3A" stroke-width="5"/>
        <circle cx="28" cy="28" r="${radius}" fill="none" stroke="${meta.color}" stroke-width="5"
          stroke-linecap="round" stroke-dasharray="${circ}" stroke-dashoffset="${offset}"
          transform="rotate(-90 28 28)"/>
      </svg>
      <div class="ring-text"><span style="color:${meta.color}">${display}</span><small>يوم</small></div>
    </div>`;
}

function dateFieldHtml(value){
  const {y,m,d} = parseDateParts(value);
  const dim = getDaysInMonth(y,m);
  const day = Math.min(d,dim);
  const curY = new Date().getFullYear();
  let days="", months="", years="";
  for(let i=1;i<=dim;i++) days += `<option value="${i}" ${i===day?"selected":""}>${i}</option>`;
  ARABIC_MONTHS.forEach((name,idx)=>{ months += `<option value="${idx+1}" ${idx+1===m?"selected":""}>${name}</option>`; });
  for(let yy=curY-6; yy<=curY+1; yy++) years += `<option value="${yy}" ${yy===y?"selected":""}>${yy}</option>`;
  return `
    <div class="date-field">
      <select id="dateDay">${days}</select>
      <select id="dateMonth">${months}</select>
      <select id="dateYear">${years}</select>
    </div>`;
}

function render(){
  const enriched = state.members.map(m=>{
    const days = getDaysLeft(m.expiration);
    return {...m, planType: m.planType || "monthly", days, status:getStatus(days)};
  });
  const stats = enriched.reduce((acc,m)=>{
    acc.total++;
    if(m.status==="active") acc.active++;
    if(m.status==="expiring") acc.expiring++;
    if(m.status==="expired") acc.expired++;
    return acc;
  }, {total:0, active:0, expiring:0, expired:0});

  const urgent = enriched.filter(m=>m.days<=3).sort((a,b)=>a.days-b.days);

  const visible = enriched
    .filter(m=> state.filter==="all" ? true : m.status===state.filter)
    .filter(m=> m.name.toLowerCase().includes(state.query.trim().toLowerCase()))
    .sort((a,b)=>a.days-b.days);

  const toastHtml = urgent.length ? `<div class="toast">⚠️ ${urgent.length} ${urgent.length===1?"عضوية تحتاج":"عضويات تحتاج"} للتجديد خلال 3 أيام أو أقل</div>` : "";

  const listHtml = visible.length === 0 ? `
    <div class="empty-state">
      <div style="display:flex; justify-content:center; margin-bottom:8px;">${dumbbellIcon(34, "#FFFFFF")}</div>
      <h3>${state.members.length===0 ? "لا يوجد أعضاء بعد" : "لا توجد نتائج"}</h3>
      <p>${state.members.length===0 ? "أضف أول عضو لبدء إدارة النادي" : "جرّب تغيير البحث أو الفلتر"}</p>
    </div>` : `
    <div class="member-list">
      ${visible.map(m=>{
        const meta = STATUS_META[m.status];
        const planLabel = m.planType === "daily"
          ? `${m.durationDays} يوم — ${m.price} دج`
          : `${m.sessions} حصص — ${m.price} دج`;
        const total = m.planType === "daily" ? m.durationDays : 30;
        return `
        <div class="member-card">
          ${ringSvg(m.days, m.status, total)}
          <div class="member-info">
            <h3>${esc(m.name)}</h3>
            <div class="meta-row">
              <span class="plan-tag">${planLabel}</span>
              <span class="status-tag" style="color:${meta.color}; background:${meta.bg}">${meta.label}</span>
            </div>
            <div class="meta-row" style="margin-top:6px">
              <span>انضم: ${formatDateAr(m.joinDate)}</span>
              <span>ينتهي: ${formatDateAr(m.expiration)}</span>
            </div>
          </div>
          <div class="actions-col">
            <button class="icon-btn" data-renew="${m.id}" title="تجديد">🔄</button>
            <button class="icon-btn" data-del="${m.id}" title="حذف">🗑️</button>
          </div>
        </div>`;
      }).join("")}
    </div>`;

  const notifPanelHtml = !state.showNotif ? "" : `
    <div class="notif-panel">
      <h3>تنبيهات انتهاء العضوية</h3>
      ${urgent.length===0 ? `<div class="notif-msg">لا توجد عضويات تحتاج تجديدًا حاليًا.</div>` :
        urgent.map(m=>`<div class="notif-item"><span>${esc(m.name)}</span><span style="color:${m.days<0?'#FF5C5C':'#FFC857'};font-weight:700">${m.days<0?"منتهية":m.days+" يوم"}</span></div>`).join("")}
      <button class="enable-btn" id="enableNotifBtn">تفعيل إشعارات المتصفح</button>
      ${state.notifMsg ? `<div class="notif-msg">${esc(state.notifMsg)}</div>` : ""}
    </div>`;

  const formModalHtml = !state.showForm ? "" : `
    <div class="modal-overlay" id="overlay">
      <div class="modal" id="modalBox">
        <div class="modal-head"><h2>إضافة عضو جديد</h2><button class="close-x" id="closeForm">✕</button></div>
        <div class="form-group">
          <label>اسم العضو</label>
          <input type="text" id="nameInput" placeholder="مثال: فريد بلفار" value="${esc(state.form.name)}" />
        </div>
        <div class="form-group">
          <label>نوع الاشتراك</label>
          <div class="filter-pills" style="margin-bottom:10px;">
            <div class="pill ${state.form.planType==='monthly'?'active-pill':''}" data-plantype="monthly">شهري</div>
            <div class="pill ${state.form.planType==='daily'?'active-pill':''}" data-plantype="daily">يومي</div>
          </div>
          ${state.form.planType === "monthly" ? `
            <div class="plan-options">
              ${Object.entries(PLANS).map(([key,p])=>`
                <div class="plan-option ${state.form.plan===key?'selected':''}" data-plan="${key}">
                  <div class="sessions">${p.sessions} حصص</div>
                  <div class="price">${p.price} دج</div>
                </div>`).join("")}
            </div>` : `
            <div style="display:flex; gap:10px;">
              <div style="flex:1;">
                <label style="font-size:12px; margin-bottom:5px;">عدد الأيام</label>
                <input type="number" min="1" id="customDaysInput" placeholder="مثلًا 10" value="${esc(state.form.customDays)}" />
              </div>
              <div style="flex:1;">
                <label style="font-size:12px; margin-bottom:5px;">السعر (تلقائي)</label>
                <input type="text" disabled style="opacity:0.7" value="${(Number(state.form.customDays)||0) * DAILY_RATE} دج" />
              </div>
            </div>`}
        </div>
        <div class="form-group">
          <label>تاريخ الانضمام (يوم/شهر/سنة)</label>
          ${dateFieldHtml(state.form.joinDate)}
        </div>
        <div class="form-group" style="margin-bottom:4px">
          <label>تاريخ الانتهاء (تلقائي)</label>
          <input type="text" disabled style="opacity:0.7" value="${formatDateAr(
            state.form.planType === "daily"
              ? safeAddDaysStr(state.form.joinDate, Number(state.form.customDays) || 0)
              : safeAddOneMonthStr(state.form.joinDate)
          )}" />
        </div>
        <button class="submit-btn" id="saveBtn">💾 حفظ العضو</button>
      </div>
    </div>`;

  document.getElementById("root").innerHTML = `
    <div class="wrap">
      <div class="header">
        <div class="brand">
          <div class="brand-icon">${dumbbellIcon(22, "#000000")}</div>
          <div><h1>إدارة النادي الرياضي</h1><span>تتبّع الأعضاء والاشتراكات</span></div>
        </div>
        <button class="bell-btn" id="bellBtn">🔔${urgent.length? `<span class="badge">${urgent.length}</span>`:""}</button>
      </div>

      ${notifPanelHtml}
      ${toastHtml}

      <div class="stats-grid">
        <div class="stat-card ${state.filter==='all'?'is-active':''}" data-filter="all"><div class="num">${stats.total}</div><div class="lbl">إجمالي الأعضاء</div></div>
        <div class="stat-card ${state.filter==='active'?'is-active':''}" data-filter="active"><div class="num" style="color:#3DDC97">${stats.active}</div><div class="lbl">عضويات نشطة</div></div>
        <div class="stat-card ${state.filter==='expiring'?'is-active':''}" data-filter="expiring"><div class="num" style="color:#FFC857">${stats.expiring}</div><div class="lbl">تنتهي قريبًا</div></div>
        <div class="stat-card ${state.filter==='expired'?'is-active':''}" data-filter="expired"><div class="num" style="color:#FF5C5C">${stats.expired}</div><div class="lbl">منتهية</div></div>
      </div>

      <div class="toolbar">
        <div class="search-box">🔍<input id="searchInput" placeholder="ابحث عن عضو بالاسم..." value="${esc(state.query)}" /></div>
        <button class="btn-primary" id="openForm">＋ إضافة عضو</button>
      </div>

      <div class="filter-pills">
        ${[["all","الكل"],["active","نشطة"],["expiring","تنتهي قريبًا"],["expired","منتهية"]].map(([k,l])=>`
          <div class="pill ${state.filter===k?'active-pill':''}" data-filter="${k}">${l}</div>`).join("")}
      </div>

      ${listHtml}
    </div>
    ${formModalHtml}
  `;

  attachEvents();
}

function attachEvents(){
  const root = document.getElementById("root");

  root.querySelector("#bellBtn")?.addEventListener("click", ()=>{ state.showNotif=!state.showNotif; render(); });
  root.querySelector("#enableNotifBtn")?.addEventListener("click", enableNotifications);
  root.querySelector("#searchInput")?.addEventListener("input", e=>{ state.query=e.target.value; render(); restoreFocus("#searchInput"); });
  root.querySelector("#openForm")?.addEventListener("click", ()=>{ state.showForm=true; render(); });
  root.querySelector("#overlay")?.addEventListener("click", (e)=>{ if(e.target.id==="overlay"){ state.showForm=false; render(); } });
  root.querySelector("#closeForm")?.addEventListener("click", ()=>{ state.showForm=false; render(); });
  root.querySelector("#nameInput")?.addEventListener("input", e=>{ state.form.name=e.target.value; });
  root.querySelector("#saveBtn")?.addEventListener("click", addMember);

  root.querySelectorAll("[data-filter]").forEach(el=>el.addEventListener("click", ()=>{ state.filter=el.dataset.filter; render(); }));
  root.querySelectorAll("[data-plan]").forEach(el=>el.addEventListener("click", ()=>{ state.form.plan=el.dataset.plan; render(); }));
  root.querySelectorAll("[data-plantype]").forEach(el=>el.addEventListener("click", ()=>{ state.form.planType=el.dataset.plantype; render(); }));
  root.querySelectorAll("[data-renew]").forEach(el=>el.addEventListener("click", ()=>renewMember(el.dataset.renew)));
  root.querySelectorAll("[data-del]").forEach(el=>el.addEventListener("click", ()=>deleteMember(el.dataset.del)));
  root.querySelector("#customDaysInput")?.addEventListener("input", e=>{ state.form.customDays=e.target.value; render(); restoreFocus("#customDaysInput"); });

  const dDay = root.querySelector("#dateDay"), dMonth = root.querySelector("#dateMonth"), dYear = root.querySelector("#dateYear");
  function updateDate(){
    if(!dDay) return;
    const y=Number(dYear.value), m=Number(dMonth.value);
    const dim = getDaysInMonth(y,m);
    let d=Number(dDay.value); if(d>dim) d=dim;
    state.form.joinDate = buildDateStr(y,m,d);
    render();
  }
  dDay?.addEventListener("change", updateDate);
  dMonth?.addEventListener("change", updateDate);
  dYear?.addEventListener("change", updateDate);
}

function restoreFocus(sel){
  const el = document.querySelector(sel);
  if(el){ el.focus(); const v=el.value; el.value=""; el.value=v; }
}

// ---------- منع التكبير بالقرص (Pinch-to-Zoom) ----------
document.addEventListener("gesturestart", e=>e.preventDefault());
document.addEventListener("gesturechange", e=>e.preventDefault());
document.addEventListener("gestureend", e=>e.preventDefault());
let __lastTouchEnd = 0;
document.addEventListener("touchend", e=>{
  const now = Date.now();
  if(now - __lastTouchEnd <= 300) e.preventDefault(); // منع التكبير بالنقر المزدوج
  __lastTouchEnd = now;
}, {passive:false});
document.addEventListener("touchmove", e=>{
  if(e.touches.length > 1) e.preventDefault(); // منع التكبير بإصبعين
}, {passive:false});

// ---------- منع السحب للتحديث (Pull-to-Refresh) ----------
let __touchStartY = 0;
document.addEventListener("touchstart", e=>{
  __touchStartY = e.touches[0].clientY;
}, {passive:true});
document.addEventListener("touchmove", e=>{
  const touchY = e.touches[0].clientY;
  const scrollY = window.scrollY || document.documentElement.scrollTop;
  if(scrollY <= 0 && touchY > __touchStartY) e.preventDefault();
}, {passive:false});

// ---------- منع تحديد النص ----------
document.addEventListener("selectstart", e=>{
  if(!["INPUT","TEXTAREA"].includes(e.target.tagName)) e.preventDefault();
});
document.addEventListener("contextmenu", e=>{
  if(!["INPUT","TEXTAREA"].includes(e.target.tagName)) e.preventDefault();
});

// ---------- تسجيل عامل الخدمة (للعمل دون اتصال) ----------
if("serviceWorker" in navigator){
  window.addEventListener("load", ()=>{
    navigator.serviceWorker.register("service-worker.js").catch(()=>{});
  });
}

loadMembers();
render();
</script>
</body>
</html>
